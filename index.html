<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WikiO</title>
  <script type="module" src="/src/main.js"></script>

  <!-- Linux Libertine (Wikipedia's body font) + Source Sans Pro -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Linux+Libertine+O&family=Source+Sans+3:ital,wght@0,400;0,600;0,700;1,400&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet">

  <style>
    /* ── Reset & Tokens ──────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-base:         #202122;
      --color-subtle:       #54595d;
      --color-muted:        #72777d;
      --color-placeholder:  #a2a9b1;
      --color-border:       #a2a9b1;
      --color-border-subtle:#eaecf0;
      --color-surface-0:    #ffffff;
      --color-surface-1:    #f8f9fa;
      --color-surface-2:    #eaecf0;
      --color-accent:       #3366cc;
      --color-accent-hover: #2a4b8d;
      --color-red:          #dd3333;
      --color-new-link:     #a55858;

      --sidebar-width: 160px;
      --header-height: 50px;

      --font-serif:   'Linux Libertine O', 'Linux Libertine', Georgia, 'Times New Roman', serif;
      --font-sans:    'Source Sans 3', 'Helvetica Neue', Arial, sans-serif;
      --font-mono:    'Source Code Pro', 'Courier New', monospace;
    }

    html { font-size: 16px; }

    body {
      font-family: var(--font-sans);
      font-size: 0.875rem;
      color: var(--color-base);
      background: var(--color-surface-1);
      line-height: 1.6;
    }

    a { color: var(--color-accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    a.new, a.page-missing { color: var(--color-new-link); }

    /* ── Header ─────────────────────────────────────────── */
    #mw-header {
      background: var(--color-surface-0);
      border-bottom: 1px solid var(--color-border);
      height: var(--header-height);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .mw-header-inner {
      display: flex;
      align-items: center;
      gap: 16px;
      height: 100%;
      padding: 0 16px;
    }

    .mw-logo {
      display: flex;
      flex-direction: column;
      line-height: 1;
      text-decoration: none;
      color: inherit;
      flex-shrink: 0;
    }

    .mw-logo-text {
      font-family: var(--font-serif);
      font-size: 1.5rem;
      font-weight: normal;
      color: var(--color-base);
      letter-spacing: -0.01em;
    }

    .mw-logo-tagline {
      font-size: 0.65rem;
      color: var(--color-muted);
      font-style: italic;
    }

    .mw-search-container {
      flex: 1;
      max-width: 480px;
    }

    #search-form {
      display: flex;
      border: 1px solid var(--color-border);
      border-radius: 2px;
      overflow: hidden;
      background: var(--color-surface-0);
    }

    #search-form:focus-within {
      border-color: var(--color-accent);
      box-shadow: 0 0 0 1px var(--color-accent);
    }

    #searchInput {
      flex: 1;
      border: none;
      outline: none;
      padding: 5px 8px;
      font-size: 0.875rem;
      font-family: var(--font-sans);
      background: transparent;
    }

    .mw-search-btn {
      border: none;
      background: var(--color-surface-2);
      padding: 5px 10px;
      cursor: pointer;
      color: var(--color-subtle);
      border-left: 1px solid var(--color-border);
    }

    .mw-search-btn:hover { background: var(--color-border); }

    /* ── Layout ─────────────────────────────────────────── */
    #mw-main-layout {
      display: flex;
      min-height: calc(100vh - var(--header-height) - 40px);
    }

    /* ── Sidebar ─────────────────────────────────────────── */
    #mw-sidebar {
      width: var(--sidebar-width);
      flex-shrink: 0;
      padding: 8px 0;
      background: var(--color-surface-1);
      border-right: 1px solid var(--color-border-subtle);
      font-size: 0.8125rem;
    }

    .mw-portal {
      padding: 8px 0;
      border-bottom: 1px solid var(--color-border-subtle);
    }

    .mw-portal:last-child { border-bottom: none; }

    .mw-portal h3 {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--color-muted);
      padding: 4px 16px 2px;
    }

    .mw-portal ul { list-style: none; }

    .mw-portal li a {
      display: block;
      padding: 3px 16px;
      color: var(--color-accent);
      font-size: 0.8125rem;
    }

    .mw-portal li a:hover {
      background: var(--color-surface-2);
      text-decoration: none;
    }

    /* ── Content ─────────────────────────────────────────── */
    #mw-content {
      flex: 1;
      min-width: 0;
      background: var(--color-surface-0);
      padding: 0;
    }

    .mw-page-container {
      max-width: 960px;
      padding: 0 16px 32px;
    }

    /* ── Tabs ────────────────────────────────────────────── */
    .mw-tabs-container {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      border-bottom: 1px solid var(--color-border);
      margin-bottom: 12px;
      padding-top: 4px;
    }

    .mw-tabs, .mw-tabs-right {
      display: flex;
      list-style: none;
      gap: 0;
      margin: 0;
      padding: 0;
    }

    .mw-tabs-right {
      gap: 12px;
      padding: 4px 0;
      font-size: 0.8rem;
    }

    .mw-tabs-right li a {
      color: var(--color-accent);
      font-size: 0.8125rem;
    }

    .mw-tab {
      position: relative;
    }

    .mw-tab a {
      display: block;
      padding: 6px 12px;
      font-size: 0.8125rem;
      color: var(--color-accent);
      border: 1px solid transparent;
      border-bottom: none;
      margin-bottom: -1px;
      border-radius: 2px 2px 0 0;
      text-decoration: none;
    }

    .mw-tab a:hover {
      background: var(--color-surface-2);
      border-color: var(--color-border);
      text-decoration: none;
    }

    .mw-tab.selected a {
      background: var(--color-surface-0);
      border-color: var(--color-border);
      border-bottom-color: var(--color-surface-0);
      color: var(--color-base);
      cursor: default;
    }

    /* ── First Heading ───────────────────────────────────── */
    .firstHeading {
      font-family: var(--font-serif);
      font-size: 1.95rem;
      font-weight: normal;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 4px;
      margin-bottom: 16px;
      line-height: 1.3;
    }

    /* ── Article Body ────────────────────────────────────── */
    .mw-parser-output {
      font-size: 0.9375rem;
      line-height: 1.65;
    }

    .mw-parser-output h1,
    .mw-parser-output h2,
    .mw-parser-output h3,
    .mw-parser-output h4,
    .mw-parser-output h5,
    .mw-parser-output h6 {
      font-family: var(--font-sans);
      font-weight: 600;
      line-height: 1.3;
      margin: 1em 0 0.25em;
    }

    .mw-parser-output h2 {
      font-size: 1.25rem;
      border-bottom: 1px solid var(--color-border-subtle);
      padding-bottom: 2px;
    }

    .mw-parser-output h3 { font-size: 1.05rem; }
    .mw-parser-output h4 { font-size: 0.95rem; }

    .mw-parser-output p { margin: 0.5em 0; }

    .mw-parser-output ul,
    .mw-parser-output ol {
      margin: 0.5em 0 0.5em 2em;
    }

    .mw-parser-output li { margin: 0.15em 0; }

    .mw-parser-output dl { margin: 0.5em 0 0.5em 1em; }
    .mw-parser-output dt { font-weight: 600; }
    .mw-parser-output dd { margin-left: 1.5em; }

    .mw-parser-output sup { font-size: 0.75em; }

    .mw-parser-output hr {
      border: none;
      border-top: 1px solid var(--color-border);
      margin: 1em 0;
    }

    /* ── Infobox ─────────────────────────────────────────── */
    table.infobox {
      float: right;
      clear: right;
      margin: 0 0 16px 24px;
      width: 220px;
      border: 1px solid var(--color-border);
      border-collapse: collapse;
      font-size: 0.8125rem;
      background: var(--color-surface-1);
      line-height: 1.4;
    }

    table.infobox caption.infobox-title {
      background: var(--color-surface-2);
      font-weight: 600;
      padding: 6px 8px;
      text-align: center;
      font-size: 0.875rem;
      border-bottom: 1px solid var(--color-border);
    }

    table.infobox th,
    table.infobox td {
      padding: 4px 8px;
      border-bottom: 1px solid var(--color-border-subtle);
      vertical-align: top;
    }

    table.infobox th {
      background: var(--color-surface-2);
      font-weight: 600;
      white-space: nowrap;
      width: 45%;
    }

    /* ── Wikitable ───────────────────────────────────────── */
    table.wikitable {
      border-collapse: collapse;
      margin: 1em 0;
      font-size: 0.875rem;
      width: auto;
    }

    table.wikitable th,
    table.wikitable td {
      border: 1px solid var(--color-border);
      padding: 5px 10px;
      vertical-align: top;
    }

    table.wikitable th {
      background: var(--color-surface-2);
      font-weight: 600;
      text-align: left;
    }

    table.wikitable tr:nth-child(even) td {
      background: var(--color-surface-1);
    }

    /* ── TOC ─────────────────────────────────────────────── */
    .toc {
      display: inline-block;
      border: 1px solid var(--color-border);
      background: var(--color-surface-1);
      padding: 10px 14px;
      font-size: 0.875rem;
      margin: 8px 0 16px;
      min-width: 180px;
    }

    .toctitle h2 {
      font-size: 0.875rem !important;
      border: none !important;
      padding: 0 !important;
      margin: 0 0 4px !important;
      text-align: center;
    }

    .toc ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .toc li { margin: 2px 0; }

    .toclevel-2 { padding-left: 1.5em; }

    .tocnumber { color: var(--color-muted); margin-right: 0.5em; }

    /* ── References ──────────────────────────────────────── */
    .references {
      font-size: 0.8125rem;
      line-height: 1.5;
    }

    .references ol {
      padding-left: 2em;
    }

    .references li {
      margin: 4px 0;
    }

    sup.reference a {
      color: var(--color-accent);
      font-size: 0.75em;
    }

    .mw-cite-backlink a {
      color: var(--color-muted);
      font-size: 0.85em;
    }

    /* ── Hatnotes & Notices ──────────────────────────────── */
    .hatnote {
      border-left: 3px solid var(--color-border);
      padding: 4px 12px;
      color: var(--color-subtle);
      font-style: italic;
      font-size: 0.875rem;
      margin: 0.5em 0 1em;
    }

    .stub-notice {
      clear: both;
      border: 1px solid var(--color-border);
      background: var(--color-surface-1);
      padding: 8px 12px;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 1em 0;
    }

    .mw-editnotice {
      background: #fef6e7;
      border: 1px solid #f0c860;
      padding: 8px 12px;
      font-size: 0.875rem;
      margin-bottom: 12px;
    }

    .new-page-notice { color: var(--color-red); }

    .template-unknown {
      color: var(--color-red);
      font-family: var(--font-mono);
      font-size: 0.8em;
      border: 1px dashed var(--color-red);
      padding: 0 3px;
    }

    /* ── Edit Page ───────────────────────────────────────── */
    .mw-editbox {
      width: 100%;
      height: 400px;
      font-family: var(--font-mono);
      font-size: 0.875rem;
      line-height: 1.5;
      border: 1px solid var(--color-border);
      padding: 8px;
      resize: vertical;
      outline: none;
      color: var(--color-base);
    }

    .mw-editbox:focus {
      border-color: var(--color-accent);
      box-shadow: 0 0 0 1px var(--color-accent);
    }

    .mw-edittools {
      margin: 4px 0;
    }

    .edit-buttons-bar {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .wikitext-btn {
      padding: 2px 8px;
      border: 1px solid var(--color-border);
      background: var(--color-surface-1);
      cursor: pointer;
      font-size: 0.8125rem;
      font-family: var(--font-sans);
      border-radius: 2px;
    }

    .wikitext-btn:hover { background: var(--color-surface-2); }

    .mw-summary-row {
      margin: 8px 0 4px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.875rem;
    }

    .mw-summary-input {
      flex: 1;
      max-width: 400px;
      border: 1px solid var(--color-border);
      padding: 4px 8px;
      font-size: 0.875rem;
      font-family: var(--font-sans);
      outline: none;
    }

    .mw-summary-input:focus { border-color: var(--color-accent); }

    .mw-edit-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .mw-preview {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 2px solid var(--color-border);
    }

    .mw-preview h2 {
      font-size: 1rem;
      color: var(--color-subtle);
      margin-bottom: 12px;
    }

    /* ── Buttons ─────────────────────────────────────────── */
    .mw-btn {
      padding: 6px 14px;
      border: 1px solid var(--color-border);
      background: var(--color-surface-2);
      cursor: pointer;
      font-size: 0.875rem;
      font-family: var(--font-sans);
      border-radius: 2px;
      color: var(--color-base);
    }

    .mw-btn:hover { background: var(--color-border); }

    .mw-btn-primary {
      background: var(--color-accent);
      border-color: var(--color-accent-hover);
      color: white;
      font-weight: 600;
    }

    .mw-btn-primary:hover { background: var(--color-accent-hover); }
    .mw-btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .mw-btn-quiet {
      background: transparent;
      border-color: transparent;
      color: var(--color-accent);
    }

    .mw-btn-quiet:hover { background: var(--color-surface-2); border-color: var(--color-border); }

    /* ── Auth ────────────────────────────────────────────── */
    .auth-form {
      max-width: 500px;
      padding: 16px 0;
    }

    .auth-form h1 {
      font-family: var(--font-serif);
      font-size: 1.95rem;
      font-weight: normal;
      border-bottom: 1px solid var(--color-border);
      padding-bottom: 4px;
      margin-bottom: 16px;
    }

    .auth-form p { margin-bottom: 12px; font-size: 0.9rem; }

    .mw-auth-table { border-collapse: collapse; }
    .mw-auth-table td { padding: 6px 8px; vertical-align: middle; }
    .mw-auth-table label { font-size: 0.875rem; }

    .mw-auth-table input[type="text"],
    .mw-auth-table input[type="password"] {
      border: 1px solid var(--color-border);
      padding: 5px 8px;
      font-size: 0.875rem;
      font-family: var(--font-sans);
      outline: none;
      width: 220px;
    }

    .mw-auth-table input:focus { border-color: var(--color-accent); }

    .auth-error {
      background: #fde8e8;
      border: 1px solid #f4b0b0;
      color: var(--color-red);
      padding: 8px 12px;
      font-size: 0.875rem;
      margin-bottom: 12px;
    }

    /* ── History ─────────────────────────────────────────── */
    #pagehistory { width: 100%; }
    .hist-date { white-space: nowrap; color: var(--color-subtle); font-size: 0.8125rem; }
    .hist-user { font-size: 0.875rem; }
    .hist-summary { color: var(--color-subtle); font-size: 0.875rem; font-style: italic; }

    /* ── Footer ─────────────────────────────────────────── */
    #mw-footer {
      background: var(--color-surface-2);
      border-top: 1px solid var(--color-border);
      padding: 10px 16px;
      font-size: 0.8rem;
      color: var(--color-muted);
    }

    #mw-footer ul {
      display: flex;
      list-style: none;
      gap: 16px;
      flex-wrap: wrap;
    }

    #mw-footer a { color: var(--color-muted); }
    #mw-footer a:hover { color: var(--color-accent); }

    /* ── External links ──────────────────────────────────── */
    a.external::after {
      content: ' ↗';
      font-size: 0.7em;
      color: var(--color-muted);
    }

    /* ── Misc ────────────────────────────────────────────── */
    code, kbd {
      font-family: var(--font-mono);
      font-size: 0.875em;
      background: var(--color-surface-1);
      padding: 0 3px;
      border: 1px solid var(--color-border-subtle);
    }

    blockquote {
      border-left: 3px solid var(--color-border);
      padding-left: 1em;
      color: var(--color-subtle);
      margin: 0.5em 0 0.5em 1em;
    }

    /* ── Clearfix ────────────────────────────────────────── */
    .mw-parser-output::after {
      content: '';
      display: table;
      clear: both;
    }
  </style>
</head>
<body>
  <div id="app"></div>
</body>
</html>
