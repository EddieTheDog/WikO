<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>WikiO</title>
  <script type="module" src="/src/main.js"></script>

  <style>
    body {
      margin: 0;
      background: #f8f9fa;
      font-family: Arial, sans-serif;
    }

    header {
      background: white;
      border-bottom: 1px solid #a2a9b1;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
    }

    .layout {
      display: flex;
    }

    aside {
      width: 220px;
      background: #eaecf0;
      min-height: 100vh;
      padding: 20px;
    }

    main {
      flex: 1;
      background: white;
      padding: 30px;
      max-width: 1100px;
    }

    h1 {
      border-bottom: 1px solid #aaa;
      padding-bottom: 10px;
    }

    textarea {
      width: 100%;
      height: 300px;
      margin-top: 20px;
      font-family: monospace;
    }

    button {
      margin-top: 10px;
      padding: 10px 16px;
      cursor: pointer;
    }

    a {
      color: #0645ad;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .infobox {
      float: right;
      width: 250px;
      border: 1px solid #aaa;
      background: #f8f9fa;
      padding: 10px;
      margin-left: 20px;
    }
  </style>
</head>

<body>
  <div id="app"></div>
</body>
</html>
